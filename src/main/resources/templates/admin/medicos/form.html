<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 600px;">
    <h3 th:text="${medico.idMedico != null ? 'Editar' : 'Nuevo'} + ' médico'"></h3>
    <form th:action="@{${medico.idMedico != null ? '/admin/medicos/actualizar' : '/admin/medicos'}}" 
          th:object="${medico}" method="post">
        <input type="hidden" th:field="*{idMedico}" />
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Especialidad</label>
            <input type="text" th:field="*{especialidad}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Tarjeta profesional</label>
            <input type="text" th:field="*{tarjetaProfesional}" class="form-control">
        </div>
        <div th:if="${medico.idMedico == null}">
            <div class="mb-3">
                <label class="form-label">Username del sistema</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/admin/medicos}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
